services:
  postgres:
    image: postgres:16
    container_name: collab-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-collab_workspace}
      POSTGRES_USER: ${POSTGRES_USER:-collab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-collab}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - collab-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-collab} -d ${POSTGRES_DB:-collab_workspace}"]
      interval: 10s
      timeout: 5s
      retries: 5

  workspace-service:
    build:
      context: ../../services/workspace-service
      dockerfile: Dockerfile
    container_name: collab-workspace-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "${WORKSPACE_SERVICE_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy

  valkey:
    image: valkey/valkey:8
    container_name: collab-valkey
    ports:
      - "${VALKEY_PORT:-6379}:6379"
    volumes:
      - collab-valkey-data:/data
    command: [ "valkey-server", "--appendonly", "yes" ]
    healthcheck:
      test: [ "CMD", "valkey-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak-postgres:
    profiles: [ "keycloak" ]
    image: postgres:16
    container_name: collab-keycloak-postgres
    environment:
      POSTGRES_DB: ${KEYCLOAK_POSTGRES_DB:-keycloak}
      POSTGRES_USER: ${KEYCLOAK_POSTGRES_USER:-keycloak}
      POSTGRES_PASSWORD: ${KEYCLOAK_POSTGRES_PASSWORD:-keycloak}
    ports:
      - "${KEYCLOAK_POSTGRES_PORT:-5434}:5432"
    volumes:
      - collab-keycloak-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${KEYCLOAK_POSTGRES_USER:-keycloak} -d ${KEYCLOAK_POSTGRES_DB:-keycloak}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    profiles: [ "keycloak" ]
    image: quay.io/keycloak/keycloak:latest
    container_name: collab-keycloak
    command: [ "start-dev" ]
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}

      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-postgres:5432/keycloak
      KC_DB_USERNAME: ${KEYCLOAK_POSTGRES_USER:-keycloak}
      KC_DB_PASSWORD: ${KEYCLOAK_POSTGRES_PASSWORD:-keycloak}
    ports:
      - "${KEYCLOAK_PORT:-8081}:8080"
    depends_on:
      keycloak-postgres:
        condition: service_healthy

volumes:
  collab-postgres-data:
  collab-valkey-data:
  collab-keycloak-postgres-data: